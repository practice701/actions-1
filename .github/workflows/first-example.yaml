name: workflow-demo
on:
  push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v7

      - name: create a text file
        run: echo "Hello, world!" > hello.txt

      - name: archive text file
        uses: actions/upload-artifact@v7
        with:
          name: gyan-hello-artifact
          path: hello.txt